<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网址导航</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f6fa;
        }

        header {
            background: #2f3640;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 10px;
        }

        .category {
            margin-bottom: 25px;
        }

        .category h2 {
            border-left: 5px solid #4078c0;
            padding-left: 10px;
            color: #333;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .links a {
            display: block;
            padding: 10px 15px;
            background: white;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .links a:hover {
            background: #4078c0;
            color: white;
        }

        footer {
            text-align: center;
            padding: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    🌐 我的网址导航
</header>

<div class="container">

    <div class="category">
        <h2>🔍 搜索引擎</h2>
        <div class="links">
            <a href="https://www.google.com" target="_blank">Google</a>
            <a href="https://www.baidu.com" target="_blank">百度</a>
            <a href="https://www.bing.com" target="_blank">Bing</a>
        </div>
    </div>

    <div class="category">
        <h2>💻 开发社区</h2>
        <div class="links">
            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="https://stackoverflow.com" target="_blank">Stack Overflow</a>
            <a href="https://juejin.cn" target="_blank">掘金</a>
        </div>
    </div>

    <div class="category">
        <h2>📚 学习资源</h2>
        <div class="links">
            <a href="https://www.runoob.com" target="_blank">菜鸟教程</a>
            <a href="https://developer.mozilla.org" target="_blank">MDN</a>
            <a href="https://www.coursera.org" target="_blank">Coursera</a>
        </div>
    </div>

    <div class="category">
        <h2>🎬 娱乐</h2>
        <div class="links">
            <a href="https://www.youtube.com" target="_blank">YouTube</a>
            <a href="https://www.bilibili.com" target="_blank">B站</a>
            <a href="https://www.netflix.com" target="_blank">Netflix</a>
        </div>
    </div>

    <div class="category">
        <h2>🛠 常用工具</h2>
        <div class="links">
            <a href="https://translate.google.com" target="_blank">谷歌翻译</a>
            <a href="https://www.canva.com" target="_blank">Canva</a>
            <a href="https://www.remove.bg" target="_blank">背景移除</a>
        </div>
    </div>

</div>

<footer>
    © 2026 我的导航页
</footer>

</body>
</html>
